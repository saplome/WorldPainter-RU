ui.dialog.masterDimensionInfo.title=什么是主维度
ui.dialog.masterDimensionInfo.message=<html><h1>主维度</h1><p>主维度是一种 WorldPainter 维度类型（类似于顶盖维度）。在常规地表维度不存在的地方，<br>它会以 1:16 的比例导出。由于主维度仅在导出时才进行缩放，因此保存、加载和编辑等操作<br>比创建同等大小的常规地表维度<em>快得多</em>。<br>但请注意，导出所需的时间是一样长的。</p><p>使用主维度可以快速创建世界中大面积的空旷区域（海洋、大陆、沙漠等）。<br>当您向地表维度添加图块时，它们会被初始化为主维度中该位置的内容。<br>这使您可以先在主维度中快速勾勒出世界的大致形状，<br>然后在地表维度中按需填充细节。</p><p>主维度可以使用常规地表维度的所有功能（地形类型、图层等），<br>因此也可以用它轻松创建大型森林、洞穴系统等。</p></html>
