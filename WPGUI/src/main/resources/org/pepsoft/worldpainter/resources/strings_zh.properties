ui.html.htmlNotesUlLi=<html>\n注意事项：\n<ul>\n<li>地形高度和连续图层（如树木、自定义对象图层、霜冻等）<br>\n将使用双三次插值平滑缩放。但伪影仍不可避免，<br>\n尤其是在较大缩放比例下。\n<li>离散图层（如注释和生物群系）以及地形类型将使用<br>\n最近邻插值缩放。在较大缩放比例下会明显呈块状。\n<li>缩放低分辨率地形（从 Minecraft 导入，或来自低分辨率高度图）<br>\n可能产生块状结果。\n<li>可能会在边缘处添加额外的陆地，以对齐区块边界。\n<li><strong>注意：</strong>如果放大，内存不足时可能失败。请先将您的工作<br>\n保存到磁盘！\n</ul>\n</html>
ui.html.htmlOnThisPage=<html>在此页面上，您可以配置自定义图层的导出顺序，并可阻止某些图层被导出。<br>\n列表中位置较高的图层会在较低的图层<em>之前</em>导出。图层不能在第一阶段和第二阶段之间移动。<br>\n<strong>注意：</strong>一旦您在此界面自定义了顺序，新图层将被添加到列表末尾。</html>
