ui.html.htmlShiftTheLevels=<html>Перамяшчаць ўзроўні ўверх ці ўніз на зададзеную колькасць блокаў;<br>\nадмоўны азначае ўніз; ўзроўні, якія (па-ранейшаму) занадта нізкія або высокія, будуць адрэзаны.</html>
