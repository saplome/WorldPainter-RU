ui.html.htmlTheImportProcess=<html>Працэс імпарту згенераваў папярэджанні. Карта можа быць пашкоджана або пашкоджана.<br>\nМагчыма, не ўсе кавалкі былі імпартаваны правільна. Калі ласка, азнаёмцеся з папярэджаннямі ніжэй\:</html
ui.html.htmlTheRandomVariations=<html>Выпадковыя варыяцыі выбраных аб'ектаў не ўсе аднолькавыя.<br>Усталюйце сцяжок, калі вы хочаце ўсталяваць аднолькавае значэнне.</html>
