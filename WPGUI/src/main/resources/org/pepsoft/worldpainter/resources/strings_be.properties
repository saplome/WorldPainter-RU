ui.html.htmlTheseAreThe=<html>Гэта налады па змаўчанні. Іх можна ўсталяваць толькі пры стварэнні<br>пласт. Пасля стварэння адрэдагуйце вымярэнне падлогі, каб змяніць вышыню і форму.</html>
ui.html.htmlThisIsAn=<html>Гэта ан alpha версія функцыянальнасці плаваючага вымярэння. Гэта не скончана і<br>можа працаваць некарэктна. Функцыянальнасць можа змяніцца. Калі ласка, апублікуйце водгук на subreddit.</html>
ui.html.htmlThisMapFormat=<html>Гэты фармат карты невядомы і не можа быць экспартаваны. Хутчэй за ўсё<br>\nпадтрымліваецца плагінам, які не ўсталяваны або не можа быць загружаны.</html>
ui.html.htmlThisRemovesEm=<html>Гэта выдаляе <em>усё</em> драўляныя і ліставыя блокі, у тым ліку штучныя!<br>\nWorldPainter не магу адрозніць натуральныя драўляныя блокі ад штучных.<br>\nНе забудзьцеся абараніць свае зборкі пластом толькі для чытання.</html>
ui.html.htmlThisWillCreate=<html>Гэта створыць круглы свет. Вымярэнне паказвае дыяметр акружнасці, і<br>\nпачатак (0,0) будзе цэнтрам. Пласт Пустэчы будзе выкарыстоўвацца для стварэння круглага краю свету.</html>
ui.html.htmlThisWillMark=<html>Гэта пазначыць усю мясцовасць як незаселеную, у выніку чаго Minecraft ствараць дрэвы,<br/>\nбасейны з вадой і лавай, ачагі бруду, жвіру, вугалю, руды і г.д. (але не пячоры), як<br/>\nкавалкі загружаюцца. Гэта прывядзе да запаволення першапачатковай загрузкі кожнага чанка, і ў вас ёсць<br/>\nніякага кантролю за тым, дзе з'яўляюцца дрэвы, снег і г.д.</html>
ui.html.htmlToChangeThe=<html>Каб змяніць вышыню і форму падлогі, зачыніце гэтае акно,<br>пстрыкніце правай кнопкай мышы кнопку пласта і выберыце «Рэдагаваць плаваючае вымярэнне».</html>
