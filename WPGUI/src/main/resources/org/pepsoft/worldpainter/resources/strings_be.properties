ui.message.thankYouForUsing=Дзякуй, што карыстаецеся WorldPainter Languages\!\n\nWorldPainter стварае і развівае Pepijn Schmitz. Падтрымайце арыгінальны праект ахвяраваннем або пакупкай у афіцыйнай краме.\n\nКалі пакет лакалізацыі WorldPainter Languages вам карысны, пастаўце рэпазіторыю зорачку на GitHub\:\nhttps\://github.com/saplome/WorldPainter-LANGUAGES
ui.text.theDottedSquareIndicates=Пункцірны квадрат паказвае "паходжанне" аб'екта; гэта значыць блок, які будзе размешчаны непасрэдна на паверхні ў месцы размяшчэння аб'екта. Вы можаце змяніць яго, адрэгуляваўшы зрушэнне. Пункцірная лінія паказвае ўзровень зямлі.\n\nПавярніце аб'ект, націснуўшы L або R.
