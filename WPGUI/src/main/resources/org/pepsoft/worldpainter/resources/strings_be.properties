ui.dialog.masterDimensionInfo.message=<html><h1>Галоўныя вымярэнні</h1><p>Галоўнае вымярэнне — гэта тып вымярэння WorldPainter (падобна на сталевое вымярэнне). Яно экспартуецца<br>у маштабе 1\:16 усюды, дзе не існуе звычайнага паверхневага вымярэння. Паколькі галоўнае вымярэнне<br>маштабуецца толькі пры экспарце, такія аперацыі, як захаванне, загрузка і рэдагаванне, <em>значна</em> хутчэйшыя, чым<br>ствараць звычайнае паверхневое вымярэнне такога ж памеру. Звярніце ўвагу, што экспарт займае столькі ж часу.</p><p>Выкарыстоўвайце галоўнае вымярэнне, каб хутка ствараць вялікія аднародныя вобласці вашага свету (акіяны, кантыненты,<br>пустыні і г.д.). Калі вы дадаеце пліткі да паверхневага вымярэння, яны ініцыялізуюцца змесцівам<br>галоўнага вымярэння ў гэтым месцы. Гэта дазваляе хутка накідаць прыблізныя формы<br>вашага свету ў галоўным вымярэнні, а затым дадаць дэталі там, дзе трэба, у паверхневым вымярэнні.</p><p>Галоўныя вымярэнні могуць выкарыстоўваць усе магчымасці звычайных паверхневых вымярэнняў (тыпы мясцовасці, пласты і г.д.),<br>таму вялікія лясы, сістэмы пячор і г.д. таксама лёгка ствараць з іх дапамогай.</p></html>
