startup.snapshot.message=<html><h1>Папярэджанне\: выпуск здымкаў</h1><p>Гэта здымак выпуску WorldPainter. Гэта для тэставання <em>толькі</em>!<p>Любыя светы, якія вы рэдагуеце з дапамогай гэтай версіі <strong>не можа быць загружаны</strong> да наступнай серыйнай версіі<br>калі гэта выпушчана і <strong>не будзе загружаны</strong> па бягучай вытворчай версіі!<p><strong>Рабіце рэзервовыя копіі</strong> любых існуючых светаў, якія вы хочаце праверыць з дапамогай гэтага выпуску, у бяспечным месцы.<p>Любая або ўся праца, якую вы выконваеце з гэтым тэставым выпускам, можа быць страчана, і калі вы не створыце рэзервовыя копіі,<br>вы можаце страціць свае цяперашнія светы.<p>Калі ласка, паведамляйце пра памылкі GitHub\: https//github.com/Captain-Chaos/WorldPainter<p>Увядзіце "Я разумею" ніжэй, каб працягнуць тэсціраванне наступнага выпуску WorldPainter\:</p></html>
