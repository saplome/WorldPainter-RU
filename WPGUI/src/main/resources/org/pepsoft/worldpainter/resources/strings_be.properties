may.we.have.your.permission=Можаце мы атрымаць ваш дазвол збіраць ананімную статыстыку выкарыстання?\nЯно прызначана толькі для таго, каб задаволіць цікаўнасць аўтара да таго, колькі іх\nлюдзі карыстаюцца праграмай і адкуль (прыкладна) яны, і якія\nфункцыі выкарыстоўваюцца часцей за ўсё. Інфармацыя не будзе ўключаць ніякіх\nасабістая інфармацыя, і яна ніколі не будзе перададзена або прададзена нікому\nтрэція асобы.\n\nКалі вы адкажаце "так", вы можаце атрымаць усплывальнае акно з запытам брандмаўэра\nза дазвол на адпраўку інфармацыі ў Інтэрнэт. Калі так, то калі ласка\nпацвердзіце свой дазвол на гэта ўсплывальнае акно.
