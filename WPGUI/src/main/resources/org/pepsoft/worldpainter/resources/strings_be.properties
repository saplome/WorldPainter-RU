ui.html.htmlPerformATest=<html>Выканайце тэставы экспарт з паменшанай плошчай і/або функцыямі<br>для больш хуткага экспарту\:</html>
ui.html.htmlReplacesAllAir=<html>Замяняе ўвесь паветра, ваду, лаву і іншыя неістотныя блокі каменем.<br>\nКаб таксама замяніць штучныя блокі, таксама выкарыстоўвайце «выдаліць усе штучныя збудаванні».</html>
