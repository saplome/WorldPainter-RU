ui.html.htmlNotesUlLi=<html>\nЗаўвагі\:\n<ul>\n<li>Вышыня рэльефу і бесперапынныя пласты, такія як дрэвы, карыстальніцкія пласты аб'ектаў, іней і г.д.<br>\nбудзе плаўна маштабавацца з дапамогай бікубічнай інтэрпаляцыі. Аднак артэфакты па-ранейшаму непазбежныя,<br>\nасабліва ў вялікіх маштабах.\n<li>Асобныя пласты, такія як анатацыі і біёмы, а таксама тып рэльефу будуць маштабавацца<br>\nз дапамогай інтэрпаляцыі бліжэйшага суседа. У вялікіх маштабах яны стануць прыкметна глыбокімі.\n<li>Маштабаванне мясцовасці з нізкім дазволам (імпартавана з Minecraft, або з нізкай вышыні раздзялення<br>\nкарта) можа прывесці да блякаваных вынікаў.\n<li>Дадатковая зямля можа быць дададзена па краях, каб адпавядаць межам кавалкаў.\n<li><strong>Увага\:</strong> калі вы павялічваеце маштаб, гэта можа не атрымацца, калі не хапае памяці. Захавайце сваю працу ў<br>\nдыск першы!\n</ul>\n</html>
ui.html.htmlOnThisPage=<html>На гэтай старонцы вы можаце наладзіць парадак экспарту вашых уласных слаёў, а таксама забараніць экспарт некаторых слаёў.<br>\nВышэйшыя пласты ў спісе экспартуюцца <em>раней</em> ніжнія пласты. Пласты нельга перамяшчаць паміж першым і другім праходам.<br>\n<strong>Заўвага\:</strong> як толькі вы наладзіце парадак на гэтым экране, новыя пласты будуць дададзены ў канец спісу.</html>
ui.html.htmlOptimiseOnLoad=<html>Аптымізацыя пры загрузцы,<br>накіп на фарбе</html>
