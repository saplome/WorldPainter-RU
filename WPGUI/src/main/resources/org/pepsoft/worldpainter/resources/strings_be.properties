ui.about.languages.body=<h2>WorldPainter Languages</h2><p>Версія 2.27.0-L2.0.0 — неафіцыйны шматмоўны форк WorldPainter 2.27.0 з інтэрфейсам на 10 мовах: англійскай, рускай, беларускай, украінскай, казахскай, нямецкай, французскай, іспанскай, італьянскай і кітайскай.</p><p>Калі праект карысны, пастаўце зорку на GitHub\:<br><a href="https\://github.com/saplome/WorldPainter-LANGUAGES">github.com/saplome/WorldPainter-LANGUAGES</a></p><p>WorldPainter Languages не звязаны з аўтарам арыгінальнага праекта. Вы можаце падтрымаць арыгінальны WorldPainter на <a href="https\://www.worldpainter.net/">worldpainter.net</a>.</p>
