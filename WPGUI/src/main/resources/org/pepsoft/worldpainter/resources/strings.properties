ui.dialog.masterDimensionInfo.title=What Is a Master Dimension
ui.dialog.masterDimensionInfo.message=<html><h1>Master Dimensions</h1><p>A Master Dimension is a WorldPainter dimension type (similar to a Ceiling Dimension). It is exported<br>at 1:16 scale wherever the regular Surface dimension does not exist. Because the Master Dimension is<br>only scaled at export, operations such as saving, loading and editing it are <em>much</em> faster than<br>creating a regular Surface dimension of that size. Note that exporting it takes just as long though.</p><p>Use a Master Dimension to quickly create large featureless areas of your world (oceans, continents,<br>deserts, etc.). When you add tiles to the Surface dimension, they will be initialised to the contents<br>of the Master Dimension in that location. This allows you to quickly sketch out the rough shapes of<br>your world in the Master Dimension, and then fill in the details where necessary in the Surface dimension.</p><p>Master Dimensions can use all the features of regular Surface dimensions (terrain types, layers, etc.)<br>so large forests, cave systems, etc. are also easily created with it.</p></html>
