ui.dialog.createMasterDimension.heading=<h1>Master Dimensions</h1>
ui.dialog.createMasterDimension.intro=<p>A Master Dimension is exported at 256 times the area and speeds up creation of very large maps.</p>
ui.dialog.createMasterDimension.bulletIrreversible=<li>You <b>cannot change your mind</b> later; to undo this choice you must start over.
ui.dialog.createMasterDimension.bulletExportSlow=<li>Loading, editing and saving are faster, but <b>export takes 256 times longer</b> than a regular dimension of the same pixel size.
ui.dialog.createMasterDimension.bulletSurfaceDetail=<li>Detail areas of the Master Dimension at 1:1 scale by switching to the Surface Dimension (
ui.dialog.createMasterDimension.bulletSurfaceDetailCont=+U or the View menu)<br>and then adding tiles (
ui.dialog.createMasterDimension.bulletSurfaceDetailEnd=+T or the Edit menu).
