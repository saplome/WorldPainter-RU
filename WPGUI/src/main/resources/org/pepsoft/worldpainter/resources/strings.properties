ui.caveSystem.hint.tunnels=Each tunnel family has independent occurrence and width. Spaghetti is winding, backbone is broader and longer, and noodles are narrow connectors.
ui.caveSystem.hint.boundaries=Controls distance from the world floor and terrain surface, transition softness and which cave families may form natural entrances.
ui.caveSystem.hint.biomes=Controls 3D lush and dripstone regions, their share of megacaverns, clay pools, mixed transitions, pointed dripstone and giant formations.
ui.caveSystem.hint.liquids=Controls regional aquifers and deep lava independently. A fixed fluid level on the General tab overrides regional water and lava selection.
