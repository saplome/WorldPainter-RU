ui.caveSystem.hint.general=Здесь задаются область действия слоя, нижняя граница генерации, выходы на поверхность, сохранение существующей воды и фиксированный уровень жидкости.
ui.caveSystem.hint.density=Общее знаковое трёхмерное поле плотности. Небольшие изменения влияют на все семейства; рекомендуемые значения сохраняют проверенную форму в стиле Minecraft.
ui.caveSystem.hint.chambers=Cheese-шум создаёт обычные открытые полости, grand-шум — широкие связанные пространства, а мегаполости — редкие залы соборного масштаба.
ui.caveSystem.hint.tunnels=У каждого семейства тоннелей независимы частота и ширина. Spaghetti извилистые, backbone шире и длиннее, noodles служат узкими соединителями.
ui.caveSystem.hint.boundaries=Расстояния от дна мира и поверхности рельефа, плавность переходов и семейства, которым разрешены естественные выходы.
ui.caveSystem.hint.biomes=Трёхмерные пышные и натёчные области, их доля в мегаполостях, глиняные бассейны, смешанные переходы и крупные натёки.
ui.caveSystem.hint.liquids=Региональные аквиферы и глубокая лава настраиваются отдельно. Фиксированный уровень на вкладке «Основное» имеет приоритет.
