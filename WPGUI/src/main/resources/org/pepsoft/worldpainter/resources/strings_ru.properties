may.we.have.your.permission=Разрешаете ли вы нам собирать анонимную статистику использования?\nЭто нужно исключительно для того, чтобы удовлетворить любопытство автора о том, сколько\nлюдей пользуется программой и откуда (примерно) они, и какие\nфункции используются чаще всего. Информация не будет включать никаких\nперсональных данных и никогда не будет передана или продана\nтретьим лицам.\n\nЕсли вы ответите "да", ваш брандмауэр может показать всплывающее окно с запросом\nразрешения на отправку информации в Интернет. Если так, пожалуйста,\nподтвердите разрешение в этом окне.
