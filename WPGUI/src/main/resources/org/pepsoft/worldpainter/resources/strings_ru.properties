wp.html.notes.ul.li.2de077a946=<html>\n\u041f\u0440\u0438\u043c\u0435\u0447\u0430\u043d\u0438\u044f\:\n<ul>\n<li>\u0412\u044b\u0441\u043e\u0442\u0430 \u0440\u0435\u043b\u044c\u0435\u0444\u0430 \u0438 \u043d\u0435\u043f\u0440\u0435\u0440\u044b\u0432\u043d\u044b\u0435 \u0441\u043b\u043e\u0438, \u0442\u0430\u043a\u0438\u0435 \u043a\u0430\u043a \u0434\u0435\u0440\u0435\u0432\u044c\u044f, \u0441\u043b\u043e\u0438 \u043f\u043e\u043b\u044c\u0437\u043e\u0432\u0430\u0442\u0435\u043b\u044c\u0441\u043a\u0438\u0445 \u043e\u0431\u044a\u0435\u043a\u0442\u043e\u0432, \u0418\u043d\u0435\u0439 \u0438 \u0442.\u0434.,<br>\n\u0431\u0443\u0434\u0443\u0442 \u043c\u0430\u0441\u0448\u0442\u0430\u0431\u0438\u0440\u043e\u0432\u0430\u043d\u044b \u043f\u043b\u0430\u0432\u043d\u043e \u0441 \u0431\u0438\u043a\u0443\u0431\u0438\u0447\u0435\u0441\u043a\u043e\u0439 \u0438\u043d\u0442\u0435\u0440\u043f\u043e\u043b\u044f\u0446\u0438\u0435\u0439. \u0410\u0440\u0442\u0435\u0444\u0430\u043a\u0442\u044b \u0432\u0441\u0451 \u0440\u0430\u0432\u043d\u043e \u043d\u0435\u0438\u0437\u0431\u0435\u0436\u043d\u044b,<br>\n\u043e\u0441\u043e\u0431\u0435\u043d\u043d\u043e \u043f\u0440\u0438 \u0431\u043e\u043b\u044c\u0448\u0438\u0445 \u043c\u0430\u0441\u0448\u0442\u0430\u0431\u0430\u0445.\n<li>\u0414\u0438\u0441\u043a\u0440\u0435\u0442\u043d\u044b\u0435 \u0441\u043b\u043e\u0438, \u0442\u0430\u043a\u0438\u0435 \u043a\u0430\u043a \u0410\u043d\u043d\u043e\u0442\u0430\u0446\u0438\u0438 \u0438 \u0411\u0438\u043e\u043c\u044b, \u0430 \u0442\u0430\u043a\u0436\u0435 \u0442\u0438\u043f \u0440\u0435\u043b\u044c\u0435\u0444\u0430, \u0431\u0443\u0434\u0443\u0442 \u043c\u0430\u0441\u0448\u0442\u0430\u0431\u0438\u0440\u043e\u0432\u0430\u043d\u044b<br>\n\u043c\u0435\u0442\u043e\u0434\u043e\u043c \u0431\u043b\u0438\u0436\u0430\u0439\u0448\u0435\u0433\u043e \u0441\u043e\u0441\u0435\u0434\u0430. \u041f\u0440\u0438 \u0431\u043e\u043b\u044c\u0448\u0438\u0445 \u043c\u0430\u0441\u0448\u0442\u0430\u0431\u0430\u0445 \u043e\u043d\u0438 \u0441\u0442\u0430\u043d\u0443\u0442 \u0437\u0430\u043c\u0435\u0442\u043d\u043e \u0443\u0433\u043b\u043e\u0432\u0430\u0442\u044b\u043c\u0438.\n<li>\u041c\u0430\u0441\u0448\u0442\u0430\u0431\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435 \u0440\u0435\u043b\u044c\u0435\u0444\u0430 \u043d\u0438\u0437\u043a\u043e\u0433\u043e \u0440\u0430\u0437\u0440\u0435\u0448\u0435\u043d\u0438\u044f (\u0438\u043c\u043f\u043e\u0440\u0442\u0438\u0440\u043e\u0432\u0430\u043d\u043d\u043e\u0433\u043e \u0438\u0437 Minecraft \u0438\u043b\u0438 \u0438\u0437 \u043a\u0430\u0440\u0442\u044b<br>\n\u0432\u044b\u0441\u043e\u0442 \u043d\u0438\u0437\u043a\u043e\u0433\u043e \u0440\u0430\u0437\u0440\u0435\u0448\u0435\u043d\u0438\u044f) \u043c\u043e\u0436\u0435\u0442 \u0434\u0430\u0442\u044c \u0443\u0433\u043b\u043e\u0432\u0430\u0442\u044b\u0439 \u0440\u0435\u0437\u0443\u043b\u044c\u0442\u0430\u0442.\n<li>\u041f\u043e \u043a\u0440\u0430\u044f\u043c \u043c\u043e\u0436\u0435\u0442 \u0431\u044b\u0442\u044c \u0434\u043e\u0431\u0430\u0432\u043b\u0435\u043d\u0430 \u0434\u043e\u043f\u043e\u043b\u043d\u0438\u0442\u0435\u043b\u044c\u043d\u0430\u044f \u0437\u0435\u043c\u043b\u044f \u0434\u043b\u044f \u0432\u044b\u0440\u0430\u0432\u043d\u0438\u0432\u0430\u043d\u0438\u044f \u043f\u043e \u0433\u0440\u0430\u043d\u0438\u0446\u0430\u043c \u0447\u0430\u043d\u043a\u043e\u0432.\n<li><strong>\u0412\u043d\u0438\u043c\u0430\u043d\u0438\u0435\:</strong> \u043f\u0440\u0438 \u0443\u0432\u0435\u043b\u0438\u0447\u0435\u043d\u0438\u0438 \u043e\u043f\u0435\u0440\u0430\u0446\u0438\u044f \u043c\u043e\u0436\u0435\u0442 \u043d\u0435 \u0443\u0434\u0430\u0442\u044c\u0441\u044f \u043f\u0440\u0438 \u043d\u0435\u0445\u0432\u0430\u0442\u043a\u0435 \u043f\u0430\u043c\u044f\u0442\u0438. \u0421\u043d\u0430\u0447\u0430\u043b\u0430 \u0441\u043e\u0445\u0440\u0430\u043d\u0438\u0442\u0435 \u0440\u0430\u0431\u043e\u0442\u0443 \u043d\u0430<br>\n\u0434\u0438\u0441\u043a\!\n</ul>\n</html>
