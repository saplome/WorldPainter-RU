ui.dialog.masterDimensionInfo.title=Что такое главное измерение
ui.dialog.masterDimensionInfo.message=<html><h1>Главные измерения</h1><p>Главное измерение — это тип измерения WorldPainter, похожий на потолочное измерение. Оно экспортируется<br>в масштабе 1\:16 там, где обычного поверхностного измерения не существует. Так как главное измерение<br>масштабируется только при экспорте, сохранение, загрузка и редактирование выполняются <em>намного</em> быстрее,<br>чем при создании обычного поверхностного измерения такого размера. Но сам экспорт занимает столько же времени.</p><p>Используйте главное измерение, чтобы быстро создавать большие области мира без мелких деталей\: океаны,<br>континенты, пустыни и т. п. Когда вы добавляете тайлы в поверхностное измерение, они инициализируются<br>содержимым главного измерения в этом месте. Так можно быстро наметить общие формы мира в главном<br>измерении, а затем заполнить детали там, где это нужно, в поверхностном измерении.</p><p>Главные измерения могут использовать все возможности обычных поверхностных измерений\: типы ландшафта,<br>слои и т. д., поэтому с их помощью также легко создавать большие леса, пещерные системы и другие элементы.</p></html>
