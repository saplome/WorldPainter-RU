the.import.functionality.only.imports.the.i.landscape=<html>Обратите внимание\: функция импорта импортирует только <i>ландшафт</i><br>из существующих карт\!<br><br>Затем вы можете изменить ландшафт и объединить изменения с<br>существующей картой с помощью функции Объединить (Ctrl+M).<br><br>Любые чанки с рукотворными постройками по умолчанию будут помечены как<br>«только для чтения» и останутся без изменений при объединении карты.<br><br>Вы можете снять флаг «только для чтения» с этих чанков, но<br>учтите, что любые рукотворные постройки в них могут быть серьёзно<br>повреждены или уничтожены\!</html>
