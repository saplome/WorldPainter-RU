ui.html.htmlMirroringWorksBy=<html>Зеркалирование работает путём поворота блоков на 180 градусов.<br>\nОно не работает для асимметричных блоков из модов,<br>\nповёрнутые версии которых не являются зеркальными копиями оригиналов.</html>
ui.html.htmlNotesUlLi=<html>\nПримечания\:\n<ul>\n<li>Высота рельефа и непрерывные слои, такие как деревья, слои пользовательских объектов, Иней и т.д.,<br>\nбудут масштабированы плавно с бикубической интерполяцией. Артефакты всё равно неизбежны,<br>\nособенно при больших масштабах.\n<li>Дискретные слои, такие как Аннотации и Биомы, а также тип рельефа, будут масштабированы<br>\nметодом ближайшего соседа. При больших масштабах они станут заметно угловатыми.\n<li>Масштабирование рельефа низкого разрешения (импортированного из Minecraft или из карты<br>\nвысот низкого разрешения) может дать угловатый результат.\n<li>По краям может быть добавлена дополнительная земля для выравнивания по границам чанков.\n<li><strong>Внимание\:</strong> при увеличении операция может не удаться при нехватке памяти. Сначала сохраните работу на<br>\nдиск\!\n</ul>\n</html>
ui.html.htmlOnThisPage=<html>На этой странице можно настроить порядок экспорта ваших пользовательских слоёв, а также запретить экспорт некоторых слоёв.<br>\nСлои выше в списке экспортируются <em>раньше</em> нижних. Слои нельзя перемещать между первым и вторым проходом.<br>\n<strong>Примечание\:</strong> после настройки порядка новые слои будут добавляться в конец списка.</html>
ui.html.htmlOptimiseOnLoad=<html>Оптимизировать при загрузке,<br>масштабировать при рисовании</html>
ui.html.htmlOptimisesTheImage=<html>Оптимизирует изображение при первой загрузке,<br>но масштабирует при рисовании. Использует меньше памяти.</html>
ui.html.htmlPerformATest=<html>Выполнить тестовый экспорт с уменьшенной областью и/или функциями<br>для более быстрого экспорта\:</html>
ui.html.htmlReplacesAllAir=<html>Заменяет весь воздух, воду, лаву и другие неплотные блоки камнем.<br>\nЧтобы также заменить рукотворные блоки, используйте ещё и «удалить все рукотворные структуры».</html>
ui.html.htmlScaleTheLevels=<html>Масштабировать уровни на указанный процент;<br>\nуровни, которые (всё ещё) слишком низкие или высокие, будут обрезаны.</html>
ui.html.htmlScalesAndOptimises=<html>Масштабирует и оптимизирует изображение в памяти<br>при первой загрузке. Использует много памяти.</html>
ui.html.htmlSelectAColour=<html>Выберите цвет и полностью залейте холст<br>\nВыбранный цвет станет цветом фона</html>
ui.html.htmlSelectAMethod=<html>Выберите метод аппаратно-ускоренного рисования. Экспериментируйте с этим,<br>чтобы улучшить общую производительность редактора или решить визуальные проблемы\:</html>
ui.html.htmlSelectAMethodAMethod=<html>Выберите метод масштабирования и рисования изображения-наложения. Экспериментируйте<br>с этим, чтобы улучшить производительность наложения\:</html>
ui.html.htmlSetAllTo=<html>Установить всё на <b>не</b> разлагаться</html>
ui.html.htmlShiftTheLevels=<html>Сдвинуть уровни вверх или вниз на указанное число блоков;<br>\nотрицательное значение — вниз; уровни, которые (всё ещё) слишком низкие или высокие, будут обрезаны.</html>
ui.html.htmlTheFollowingLayers=<html>Следующие слои будут удалены. Снимите отметку<br>с тех слоёв, которые не хотите удалять\:</html>
ui.html.htmlTheImportProcess=<html>При импорте возникли предупреждения. Карта может быть повреждена.<br>\nНе все чанки могли быть импортированы корректно. Просмотрите предупреждения ниже\:</html
ui.html.htmlTheRandomVariations=<html>Случайные вариации выбранных объектов не одинаковы.<br>Отметьте флажок, если хотите установить их все в одно значение.</html>
ui.html.htmlTheRelativeFrequencies=<html>Относительные частоты выбранных объектов не одинаковы.<br>Отметьте флажок, если хотите установить их все в одно значение.</html>
ui.html.htmlTheseAreThe=<html>Это настройки по умолчанию. Их можно задать только при создании<br>слоя. После создания отредактируйте измерение пола, чтобы изменить высоту и форму.</html>
ui.html.htmlThisIsAn=<html>Это альфа-версия функции плавающего измерения. Она не завершена и<br>может работать некорректно. Функционал может измениться. Оставьте отзыв на subreddit.</html>
ui.html.htmlThisMapFormat=<html>Этот формат карты неизвестен и не может быть экспортирован. Скорее всего, он<br>\nподдерживается плагином, который не установлен или не может быть загружен.</html>
ui.html.htmlThisRemovesEm=<html>Это удаляет <em>все</em> блоки дерева и листвы, включая рукотворные\!<br>\nWorldPainter не может отличить природные блоки дерева от рукотворных.<br>\nОбязательно защитите свои постройки слоем «Только чтение».</html>
ui.html.htmlThisWillCreate=<html>Это создаст круглый мир. Измерение указывает диаметр круга, а<br>\nначало (0,0) будет центром. Слой Пустота будет использован для создания круглого края мира.</html>
ui.html.htmlThisWillMark=<html>Это пометит весь рельеф как незаселённый, заставляя Minecraft генерировать деревья,<br/>\nводоёмы и лужи лавы, карманы земли, гравия, угля, руды и т.д. (но не пещеры) по мере<br/>\nзагрузки чанков. Это замедлит первоначальную загрузку каждого чанка, и вы<br/>\nне сможете контролировать, где появятся деревья, снег и т.д.</html>
ui.html.htmlToChangeThe=<html>Чтобы изменить высоту и форму пола, закройте это окно,<br>щёлкните правой кнопкой по кнопке слоя и выберите «Изменить плавающее измерение».</html>
