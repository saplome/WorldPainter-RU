may.we.have.your.permission=¿Nos da su permiso para recopilar estadísticas de uso anónimas?\nSu único propósito es satisfacer la curiosidad del autor sobre cuántas\npersonas usan el programa y de dónde son (aproximadamente), y qué\nfunciones se usan más a menudo. La información no incluirá ningún\ndato personal, y nunca se cederá ni venderá a terceros.\n\nSi responde \"sí\", puede que su cortafuegos muestre una ventana pidiendo\npermiso para enviar información a Internet. Si es así, por favor\nconfirme su permiso en esa ventana.
