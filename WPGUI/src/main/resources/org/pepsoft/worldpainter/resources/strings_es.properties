ui.html.htmlOptimisesTheImage=<html>Optimiza la imagen cuando se carga por primera vez,<br>pero la escala al pintar. Usa menos memoria.</html>
ui.html.htmlPerformATest=<html>Realizar una exportación de prueba con área y/o elementos reducidos<br>para exportar más rápido\:</html>
ui.html.htmlReplacesAllAir=<html>Reemplaza todo el aire, agua, lava y otros bloques insustanciales por piedra.<br>\nPara reemplazar también los bloques artificiales, use además "eliminar todas las estructuras artificiales".</html>
ui.html.htmlScaleTheLevels=<html>Escala los niveles según el porcentaje especificado;<br>\nlos niveles que (aún) sean demasiado bajos o altos se recortarán.</html>
ui.html.htmlScalesAndOptimises=<html>Escala y optimiza la imagen en memoria<br>cuando se carga por primera vez. Usa mucha memoria.</html>
