startup.snapshot.message=<html><h1>Advertencia: versión snapshot</h1><p>Esta es una versión snapshot de WorldPainter. ¡Es <em>solo</em> para pruebas!<p>Los mundos que edite con esta versión <strong>podrían no poder cargarse</strong> con la próxima versión de producción<br>cuando se publique, ¡y <strong>no podrán cargarse</strong> con la versión de producción actual!<p><strong>Haga copias de seguridad</strong> de los mundos existentes con los que desee probar esta versión, en un lugar seguro.<p>Todo el trabajo que haga con esta versión de prueba podría perderse y, si no crea copias de seguridad,<br>podría perder sus mundos actuales.<p>Informe de los errores en GitHub: https://github.com/Captain-Chaos/WorldPainter<p>Escriba \"I understand\" abajo para continuar con las pruebas de la próxima versión de WorldPainter:</p></html>
