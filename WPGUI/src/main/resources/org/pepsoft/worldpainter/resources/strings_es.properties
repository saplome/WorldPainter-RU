ui.html.htmlTheseAreThe=<html>Estos son los ajustes predeterminados. Solo pueden establecerse al crear la<br>capa. Una vez creada, edite la dimensión de suelo para cambiar la altura y la forma.</html>
ui.html.htmlThisIsAn=<html>Esta es una versión alfa de la funcionalidad de dimensiones flotantes. No está terminada y<br>puede no funcionar correctamente. La funcionalidad puede cambiar. Publique sus comentarios en el subreddit.</html>
ui.html.htmlThisMapFormat=<html>Este formato de mapa es desconocido y no se puede exportar. Lo más probable es que<br>\nsea compatible mediante un plugin que no está instalado o no se puede cargar.</html>
ui.html.htmlThisRemovesEm=<html>¡Esto elimina <em>todos</em> los bloques de madera y hojas, incluidos los artificiales\!<br>\nWorldPainter no puede distinguir entre bloques de madera naturales y artificiales.<br>\nAsegúrese de proteger sus construcciones con la capa de solo lectura.</html>
ui.html.htmlThisWillCreate=<html>Esto creará un mundo circular. La dimensión indica el diámetro del círculo, y<br>\nel origen (0,0) será el centro. La capa de vacío se usará para crear el borde circular del mundo.</html>
ui.html.htmlThisWillMark=<html>Esto marcará todo el terreno como no generado, haciendo que Minecraft genere árboles,<br/>\ncharcas de agua y lava, bolsas de tierra, grava, carbón, minerales, etc. (pero no cavernas) a medida<br/>\nque se cargan los chunks. Esto ralentizará la carga inicial de cada chunk, y no tendrá<br/>\nningún control sobre dónde aparecen los árboles, la nieve, etc.</html>
ui.html.htmlToChangeThe=<html>Para cambiar la altura y la forma del suelo, cierre esta ventana,<br>haga clic derecho en el botón de la capa y seleccione "Editar dimensión flotante".</html>
