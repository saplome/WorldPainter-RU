ui.about.languages.body=<h2>WorldPainter Languages</h2><p>Versión 2.27.0-L2.0.0 — una bifurcación multilingüe no oficial de WorldPainter 2.27.0 con la interfaz disponible en 10 idiomas: inglés, ruso, bielorruso, ucraniano, kazajo, alemán, francés, español, italiano y chino.</p><p>Si el proyecto le resulta útil, dele una estrella en GitHub\:<br><a href="https\://github.com/saplome/WorldPainter-LANGUAGES">github.com/saplome/WorldPainter-LANGUAGES</a></p><p>WorldPainter Languages no está afiliado al autor del proyecto original. Puede apoyar el WorldPainter original en <a href="https\://www.worldpainter.net/">worldpainter.net</a>.</p>
