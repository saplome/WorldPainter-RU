ui.dialog.masterDimensionInfo.title=Qué es una dimensión maestra
ui.dialog.masterDimensionInfo.message=<html><h1>Dimensiones maestras</h1><p>Una dimensión maestra es un tipo de dimensión de WorldPainter (similar a una dimensión de techo). Se exporta<br>a escala 1:16 allí donde no existe la dimensión de superficie normal. Como la dimensión maestra<br>solo se escala al exportar, operaciones como guardar, cargar y editar son <em>mucho</em> más rápidas que<br>crear una dimensión de superficie normal de ese tamaño. Tenga en cuenta que exportarla tarda igual de todos modos.</p><p>Use una dimensión maestra para crear rápidamente grandes áreas sin detalles de su mundo (océanos, continentes,<br>desiertos, etc.). Cuando añada teselas a la dimensión de superficie, se inicializarán con el contenido<br>de la dimensión maestra en esa ubicación. Esto le permite esbozar rápidamente las formas generales de<br>su mundo en la dimensión maestra y luego completar los detalles donde sea necesario en la dimensión de superficie.</p><p>Las dimensiones maestras pueden usar todas las funciones de las dimensiones de superficie normales (tipos de terreno, capas, etc.)<br>por lo que también permiten crear fácilmente grandes bosques, sistemas de cuevas, etc.</p></html>
