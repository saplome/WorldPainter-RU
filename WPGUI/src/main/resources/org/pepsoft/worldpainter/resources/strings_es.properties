ui.html.htmlMirroringWorksBy=<html>El reflejo funciona rotando los bloques 180 grados.<br>\nNo funciona con bloques asimétricos de mods cuyas<br>\nversiones rotadas no son reflejos de los originales.</html>
ui.html.htmlNotesUlLi=<html>\nNotas\:\n<ul>\n<li>La altura del terreno y las capas continuas como árboles, capas de objetos personalizados, escarcha, etc.<br>\nse escalarán suavemente mediante interpolación bicúbica. Aun así, los artefactos son inevitables,<br>\nespecialmente a escalas grandes.\n<li>Las capas discretas como anotaciones y biomas, y también el tipo de terreno, se escalarán<br>\nmediante interpolación de vecino más próximo. A escalas grandes se verán notablemente pixeladas.\n<li>Escalar terreno de baja resolución (importado de Minecraft o de un mapa de alturas de baja<br>\nresolución) puede dar resultados pixelados.\n<li>Puede añadirse terreno adicional en los bordes para ajustarse a los límites de los chunks.\n<li><strong>Precaución\:</strong> si está aumentando la escala, esto puede fallar si no hay suficiente memoria. ¡Guarde antes su trabajo<br>\nen disco\!\n</ul>\n</html>
ui.html.htmlOnThisPage=<html>En esta página puede configurar el orden de exportación de sus capas personalizadas, así como impedir que ciertas capas se exporten.<br>\nLas capas más altas de la lista se exportan <em>antes</em> que las más bajas. Las capas no pueden moverse entre la primera y la segunda pasada.<br>\n<strong>Nota\:</strong> una vez que personalice el orden en esta pantalla, las capas nuevas se añadirán al final de la lista.</html>
