ui.dialog.masterDimensionInfo.message=<html><h1>Негізгі кескіндер</h1><p>Негізгі кескін — WorldPainter кескін түрі (төбешік кескініне ұқсас). Ол экспортталады<br>1\:16 масштабында, әдеттегі беттік кескін жоқ жерлерде. Негізгі кескін<br>тек экспорт кезінде масштабталады, сондықтан сақтау, жүктеу және өңдеу сияқты операциялар <em>айтарлықтай</em> жылдамырақ,<br>сондай өлшемдегі әдеттегі беттік кескін жасаудан. Оны экспорттау да сол уақытты алады.</p><p>Әлеміңіздің үлкен біркелкі аймақтарын (мұхиттар, континенттер,<br>шөлдер және т.б.) жылдам жасау үшін негізгі кескінді пайдаланыңыз. Беттік кескінге плиткалар қосқанда, олар<br>сол орындағы негізгі кескіннің мазмұнымен инициализацияланады. Бұл негізгі кескінде әлеміңіздің шамамен пішіндерін<br>жылдам сызуға мүмкіндік береді, содан кейін қажет жерлерде беттік кескінде мәліметтерді толықтырыңыз.</p><p>Негізгі кескіндер әдеттегі беттік кескіндердің барлық мүмкіндіктерін (рельеф түрлері, қабаттар және т.б.) пайдалана алады,<br>сондықтан үлкен ормандар, үңгір жүйелері және т.б. де оңай жасалады.</p></html>
