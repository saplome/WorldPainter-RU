ui.html.htmlNotesUlLi=<html>\nЕскертулер\:\n<ul>\n<li>Жер бедерінің биіктігі және үздіксіз қабаттар, мысалы, ағаштар, теңшелетін нысан қабаттары, аяз және т.б.<br>\nбикубтық интерполяция көмегімен біркелкі масштабталады. Артефактілер әлі де болдырмайды,<br>\nәсіресе үлкен масштабта.\n<li>Аннотациялар және Биомалар сияқты дискретті қабаттар, сонымен қатар рельеф түрі масштабталады<br>\nжақын көршілес интерполяцияны қолдану. Үлкенірек масштабта олар айтарлықтай блокталады.\n<li>Ажыратымдылығы төмен рельефті масштабтау (импортталған Minecraft, немесе төмен ажыратымдылық биіктігінен<br>\nкарта) бұғатталған нәтижелерге әкелуі мүмкін.\n<li>Бөлшектердің шекараларын қанағаттандыру үшін шеттердің айналасына қосымша жер қосылуы мүмкін.\n<li><strong>Абайлаңыз\:</strong> егер масштабты үлкейтіп жатсаңыз, жад жеткіліксіз болса, бұл сәтсіз болуы мүмкін. Жұмысыңызды мына жерге сақтаңыз<br>\nалдымен диск!\n</ul>\n</html>
ui.html.htmlOnThisPage=<html>Бұл бетте сіз реттелетін қабаттардың экспорттау ретін конфигурациялай аласыз, сонымен қатар белгілі бір қабаттардың экспортталуын болдырмайды.<br>\nТізімдегі жоғарырақ қабаттар экспортталады <em>бұрын</em> төменгі қабаттар. Қабаттарды бірінші немесе екінші өту арасында жылжыту мүмкін емес.<br>\n<strong>Ескерту\:</strong> осы экрандағы ретті теңшегеннен кейін тізімнің соңына жаңа қабаттар қосылады.</html>
ui.html.htmlOptimiseOnLoad=<html>Жүктемеде оңтайландыру,<br>бояудағы масштаб</html>
ui.html.htmlOptimisesTheImage=<html>Кескінді бірінші рет жүктегенде оңтайландырады,<br>бірақ бояу кезінде оны масштабтайды. Жадты аз пайдаланады.</html>
ui.html.htmlPerformATest=<html>Кеңейтілген аумақ және/немесе мүмкіндіктермен сынақ экспортын орындаңыз<br>жылдамырақ экспорттау үшін\:</html>
ui.html.htmlReplacesAllAir=<html>Барлық ауаны, суды, лаваны және басқа да маңызды емес блоктарды таспен ауыстырады.<br>\nЖасанды блоктарды да ауыстыру үшін «барлық жасанды құрылымдарды алып тастаңыз» дегенді де пайдаланыңыз.</html>
ui.html.htmlScaleTheLevels=<html>Көрсетілген пайыз бойынша деңгейлерді масштабтау;<br>\n(әлі де) тым төмен немесе жоғары деңгейлер үзіледі.</html>
ui.html.htmlScalesAndOptimises=<html>Сурет жадта бірінші жүктелгенде масштабталады және оңтайландырылады.<br>Көп жад пайдаланады.</html>
ui.html.htmlSelectAColour=<html>Түсті таңдап, кенепті толығымен толтырыңыз<br>\nТаңдалған түс фон түсіне айналады</html>
