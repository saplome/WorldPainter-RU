ui.html.htmlTheImportProcess=<html>Импорттау процесі ескертулерді жасады. Карта зақымдалған немесе бүлінген болуы мүмкін.<br>\nБарлық бөліктер дұрыс импортталмаған болуы мүмкін. Төмендегі ескертулерді қарап шығыңыз\:</html
ui.html.htmlTheRandomVariations=<html>Таңдалған нысандардың кездейсоқ вариациялары бірдей емес.<br>Олардың барлығын бірдей мәнге орнатқыңыз келсе, құсбелгіні қойыңыз.</html>
ui.html.htmlTheRelativeFrequencies=<html>Таңдалған объектілердің салыстырмалы жиіліктері бірдей емес.<br>Олардың барлығын бірдей мәнге орнатқыңыз келсе, құсбелгіні қойыңыз.</html>
ui.html.htmlTheseAreThe=<html>Бұл әдепкі параметрлер. Оларды жасау кезінде ғана орнатуға болады<br>қабат. Жасалғаннан кейін биіктік пен пішінді өзгерту үшін еден кескінін өңдеңіз.</html>
ui.html.htmlThisIsAn=<html>Бұл а alpha өзгермелі кескін функциясының нұсқасы. Ол аяқталмаған және<br>дұрыс жұмыс істемеуі мүмкін. Функционалдық өзгеруі мүмкін. Субреддитке пікір қалдырыңыз.</html>
ui.html.htmlThisMapFormat=<html>Бұл карта пішімі белгісіз және оны экспорттау мүмкін емес. Сірә<br>\nорнатылмаған немесе жүктелмейтін плагинге қолдау көрсетіледі.</html>
ui.html.htmlThisRemovesEm=<html>Бұл жояды <em>барлығы</em> ағаш және жапырақ блоктары, оның ішінде жасанды блоктар!<br>\nWorldPainter табиғи және жасанды ағаш блоктарды ажырата алмайды.<br>\nҚұрылымдарды тек оқуға арналған қабатпен қорғаңыз.</html>
ui.html.htmlThisWillCreate=<html>Бұл айналмалы әлемді жасайды. Өлшем шеңбердің диаметрін көрсетеді және<br>\nбастапқы (0,0) орталық болады. Void қабаты әлемнің дөңгелек жиегін жасау үшін пайдаланылады.</html>
ui.html.htmlThisWillMark=<html>Бұл бүкіл рельефті қоныстанбаған деп белгілеп, тудырады Minecraft ағаштар жасау,<br/>\nсу және лава бассейндері, кір, қиыршық тас, көмір, кен және т.б. қалталар (бірақ үңгірлер емес)<br/>\nкесектері жүктеледі. Бұл әрбір бөліктің бастапқы жүктелуін баяулатады және сізде бар<br/>\nағаштардың, қардың және т.б. пайда болатын жерлерге бақылау жоқ.</html>
ui.html.htmlToChangeThe=<html>Еденнің биіктігі мен пішінін өзгерту үшін осы терезені жабыңыз,<br>қабат түймешігін тінтуірдің оң жақ түймешігімен басып, «Қалқымалы кескінді өңдеу» таңдаңыз.</html>
