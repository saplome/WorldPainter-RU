may.we.have.your.permission=Анонимді пайдалану статистикасын жинауға рұқсат алуымызға бола ма?\nБұл тек автордың қанша деген қызығушылығын қанағаттандыруға арналған\nадамдар бағдарламаны пайдаланады және олар қайдан (шамамен) және қайдан\nфункциялары жиі қолданылады. Ақпарат ешқайсысын қамтымайды\nжеке ақпарат және ол ешқашан ешкімге берілмейді немесе сатылмайды\nүшінші тұлғалар.\n\nЕгер сіз «иә» деп жауап берсеңіз, желіаралық қалқан сұрайтын қалқымалы терезені алуыңыз мүмкін\nИнтернетке ақпаратты жіберуге рұқсат алу үшін. Олай болса, өтінемін\nсол қалқымалы терезеде рұқсатыңызды растаңыз.
