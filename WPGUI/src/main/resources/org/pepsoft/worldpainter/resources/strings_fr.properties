ui.html.htmlSetAllTo=<html>Tout définir sur <b>non</b> périssable</html>
ui.html.htmlShiftTheLevels=<html>Décaler les niveaux vers le haut ou le bas du nombre de blocs spécifié;<br>\nnégatif signifie vers le bas; les niveaux (encore) trop bas ou trop hauts seront coupés.</html>
ui.html.htmlTheFollowingLayers=<html>Les couches suivantes seront supprimées. Désélectionnez<br>les couches que vous ne voulez pas supprimer\:</html>
ui.html.htmlTheImportProcess=<html>Le processus d’importation a généré des avertissements. La carte est peut-être endommagée ou corrompue.<br>\nTous les chunks n’ont peut-être pas été importés correctement. Veuillez consulter les avertissements ci-dessous\:</html
ui.html.htmlTheRandomVariations=<html>Les variations aléatoires des objets sélectionnés ne sont pas toutes identiques.<br>Cochez la case si vous voulez toutes les définir sur la même valeur.</html>
ui.html.htmlTheRelativeFrequencies=<html>Les fréquences relatives des objets sélectionnés ne sont pas toutes identiques.<br>Cochez la case si vous voulez toutes les définir sur la même valeur.</html>
ui.html.htmlTheseAreThe=<html>Ce sont les paramètres par défaut. Ils ne peuvent être définis qu’à la création de la<br>couche. Une fois créée, modifiez la dimension de sol pour changer la hauteur et la forme.</html>
ui.html.htmlThisIsAn=<html>Ceci est une version alpha de la fonctionnalité de dimension flottante. Elle n’est pas terminée et<br>peut ne pas fonctionner correctement. La fonctionnalité peut changer. Merci de donner votre avis sur le subreddit.</html>
ui.html.htmlThisMapFormat=<html>Ce format de carte est inconnu et ne peut pas être exporté. Il est probablement<br>\npris en charge par un plugin qui n’est pas installé ou ne peut pas être chargé.</html>
ui.html.htmlThisRemovesEm=<html>Ceci retire <em>tous</em> les blocs de bois et de feuilles, y compris artificiels\!<br>\nWorldPainter ne peut pas faire la différence entre les blocs de bois naturels et artificiels.<br>\nPensez à protéger vos constructions avec la couche Lecture seule.</html>
ui.html.htmlThisWillCreate=<html>Ceci créera un monde circulaire. La dimension indique le diamètre du cercle, et<br>\nl’origine (0,0) en sera le centre. La couche Vide sera utilisée pour créer le bord circulaire du monde.</html>
ui.html.htmlThisWillMark=<html>Ceci marquera tout le terrain comme non peuplé, ce qui amènera Minecraft à générer arbres,<br/>\nplans d’eau et de lave, poches de terre, gravier, charbon, minerais, etc. (mais pas les cavernes) au fur et à mesure du<br/>\nchargement des chunks. Cela ralentira le chargement initial de chaque chunk, et vous n’avez<br/>\naucun contrôle sur l’emplacement des arbres, de la neige, etc.</html>
ui.html.htmlToChangeThe=<html>Pour changer la hauteur et la forme du sol, fermez cette fenêtre,<br>faites un clic droit sur le bouton de la couche et sélectionnez « Modifier la dimension flottante ».</html>
