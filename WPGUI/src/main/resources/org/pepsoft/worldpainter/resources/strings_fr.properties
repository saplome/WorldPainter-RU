ui.about.languages.body=<h2>WorldPainter Languages</h2><p>Version 2.27.0-L2.0.0 — un fork multilingue non officiel de WorldPainter 2.27.0 dont l’interface est disponible en 10 langues : anglais, russe, biélorusse, ukrainien, kazakh, allemand, français, espagnol, italien et chinois.</p><p>Si le projet vous est utile, mettez une étoile sur GitHub\:<br><a href="https\://github.com/saplome/WorldPainter-LANGUAGES">github.com/saplome/WorldPainter-LANGUAGES</a></p><p>WorldPainter Languages n’est pas affilié à l’auteur du projet original. Vous pouvez soutenir le WorldPainter original sur <a href="https\://www.worldpainter.net/">worldpainter.net</a>.</p>
