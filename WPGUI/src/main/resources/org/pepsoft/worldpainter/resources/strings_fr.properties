ui.dialog.masterDimensionInfo.title=Qu’est-ce qu’une dimension principale
ui.dialog.masterDimensionInfo.message=<html><h1>Dimensions principales</h1><p>Une dimension principale est un type de dimension WorldPainter (semblable à une dimension-plafond). Elle est exportée<br>à l’échelle 1:16 partout où la dimension Surface normale n’existe pas. Comme la dimension principale n’est<br>mise à l’échelle qu’à l’exportation, les opérations comme l’enregistrement, le chargement et la modification sont <em>beaucoup</em> plus rapides que<br>de créer une dimension Surface normale de cette taille. Notez que l’exportation prend cependant tout autant de temps.</p><p>Utilisez une dimension principale pour créer rapidement de grandes zones sans détails de votre monde (océans, continents,<br>déserts, etc.). Quand vous ajoutez des tuiles à la dimension Surface, elles sont initialisées avec le contenu<br>de la dimension principale à cet endroit. Cela vous permet d’esquisser rapidement les formes grossières de<br>votre monde dans la dimension principale, puis de remplir les détails là où c’est nécessaire dans la dimension Surface.</p><p>Les dimensions principales peuvent utiliser toutes les fonctionnalités des dimensions Surface normales (types de terrain, couches, etc.),<br>donc les grandes forêts, réseaux de grottes, etc. s’y créent aussi facilement.</p></html>
