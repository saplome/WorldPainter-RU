ui.html.htmlMirroringWorksBy=<html>Le miroir fonctionne en faisant pivoter les blocs de 180 degrés.<br>\nIl ne fonctionne pas pour les blocs de mods asymétriques dont<br>\nles versions pivotées ne sont pas les miroirs des originaux.</html>
ui.html.htmlNotesUlLi=<html>\nRemarques\:\n<ul>\n<li>La hauteur du terrain et les couches continues comme les arbres, les couches d’objets personnalisés, le givre, etc.<br>\nseront mises à l’échelle en douceur par interpolation bicubique. Des artéfacts restent toutefois inévitables,<br>\nsurtout aux grandes échelles.\n<li>Les couches discrètes comme les annotations et les biomes, mais aussi le type de terrain, seront mis à l’échelle<br>\npar interpolation au plus proche voisin. Aux grandes échelles, ils deviendront visiblement pixelisés.\n<li>La mise à l’échelle d’un terrain basse résolution (importé de Minecraft, ou d’une carte de hauteur basse<br>\nrésolution) peut donner des résultats pixelisés.\n<li>Du terrain supplémentaire peut être ajouté sur les bords pour respecter les limites des chunks.\n<li><strong>Attention\:</strong> si vous agrandissez, cela peut échouer s’il n’y a pas assez de mémoire. Enregistrez d’abord votre travail sur<br>\ndisque\!\n</ul>\n</html>
ui.html.htmlOnThisPage=<html>Sur cette page, vous pouvez configurer l’ordre d’exportation de vos couches personnalisées, et empêcher l’exportation de certaines couches.<br>\nLes couches plus hautes dans la liste sont exportées <em>avant</em> les couches plus basses. Les couches ne peuvent pas être déplacées entre la première et la deuxième passe.<br>\n<strong>Remarque\:</strong> une fois que vous personnalisez l’ordre sur cet écran, les nouvelles couches seront ajoutées à la fin de la liste.</html>
ui.html.htmlOptimiseOnLoad=<html>Optimiser au chargement,<br>mettre à l’échelle en peignant</html>
ui.html.htmlOptimisesTheImage=<html>Optimise l’image lors de son premier chargement,<br>mais la met à l’échelle en peignant. Utilise moins de mémoire.</html>
ui.html.htmlPerformATest=<html>Effectuer une exportation de test avec une zone et/ou des éléments réduits<br>pour une exportation plus rapide\:</html>
ui.html.htmlReplacesAllAir=<html>Remplace tout l’air, l’eau, la lave et les autres blocs non solides par de la pierre.<br>\nPour remplacer aussi les blocs artificiels, utilisez également « retirer toutes les structures artificielles ».</html>
ui.html.htmlScaleTheLevels=<html>Mettre à l’échelle les niveaux du pourcentage spécifié;<br>\nles niveaux (encore) trop bas ou trop hauts seront coupés.</html>
ui.html.htmlScalesAndOptimises=<html>Met à l’échelle et optimise l’image en mémoire<br>lors de son premier chargement. Utilise beaucoup de mémoire.</html>
ui.html.htmlSelectAColour=<html>Sélectionner une couleur et remplir complètement le canevas<br>\nLa couleur sélectionnée deviendra la couleur d’arrière-plan</html>
ui.html.htmlSelectAMethod=<html>Sélectionnez une méthode de peinture accélérée par le matériel. Expérimentez<br>pour améliorer les performances générales de l’éditeur ou résoudre des problèmes visuels\:</html>
