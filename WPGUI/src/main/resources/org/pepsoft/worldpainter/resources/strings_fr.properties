startup.snapshot.message=<html><h1>Attention: version snapshot</h1><p>Ceci est une version snapshot de WorldPainter. Elle sert <em>uniquement</em> aux tests!<p>Les mondes que vous modifiez avec cette version <strong>pourraient ne pas être chargeables</strong> par la prochaine version de production<br>quand elle sortira et <strong>ne seront pas chargeables</strong> par la version de production actuelle!<p><strong>Faites des sauvegardes</strong> des mondes existants que vous voulez tester avec cette version, dans un endroit sûr.<p>Tout le travail effectué avec cette version de test peut être perdu, et si vous ne créez pas de sauvegardes,<br>vous pouvez perdre vos mondes actuels.<p>Veuillez signaler les bogues sur GitHub: https://github.com/Captain-Chaos/WorldPainter<p>Tapez « I understand » ci-dessous pour continuer à tester la prochaine version de WorldPainter:</p></html>
