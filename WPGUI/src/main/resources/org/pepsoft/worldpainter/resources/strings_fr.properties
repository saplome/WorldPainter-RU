ui.dialog.createMasterDimension.heading=<h1>Dimensions principales</h1>
ui.dialog.createMasterDimension.intro=<p>Une dimension principale est exportée à 256 fois la surface et accélère la création de très grandes cartes.</p>
ui.dialog.createMasterDimension.bulletIrreversible=<li>Vous <b>ne pourrez pas changer d’avis</b> plus tard; pour annuler ce choix, vous devrez tout recommencer.
ui.dialog.createMasterDimension.bulletExportSlow=<li>Le chargement, la modification et l’enregistrement sont plus rapides, mais <b>l’exportation prend 256 fois plus de temps</b> qu’une dimension normale de la même taille en pixels.
ui.dialog.createMasterDimension.bulletSurfaceDetail=<li>Détaillez des zones de la dimension principale à l’échelle 1:1 en passant à la dimension Surface (
ui.dialog.createMasterDimension.bulletSurfaceDetailCont=+U ou le menu Affichage)<br>puis en ajoutant des tuiles (
ui.dialog.createMasterDimension.bulletSurfaceDetailEnd=+T ou le menu Édition).
