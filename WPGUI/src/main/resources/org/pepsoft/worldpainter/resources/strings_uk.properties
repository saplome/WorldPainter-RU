ui.dialog.masterDimensionInfo.title=Що таке головний вимір
ui.dialog.masterDimensionInfo.message=<html><h1>Головні виміри</h1><p>Головний вимір — це тип виміру WorldPainter (подібний до стельового виміру). Його експортують<br>у масштабі 1\:16 усюди, де не існує звичайного поверхневого виміру. Оскільки головний вимір<br>масштабується лише під час експорту, такі операції, як збереження, завантаження та редагування, є <em>значно</em> швидшими, ніж<br>створення звичайного поверхневого виміру такого ж розміру. Зауважте, що експорт займає стільки ж часу.</p><p>Використовуйте головний вимір, щоб швидко створювати великі однорідні області вашого світу (океани, континенти,<br>пустелі тощо). Коли ви додаєте плитки до поверхневого виміру, вони ініціалізуються вмістом<br>головного виміру в цьому місці. Це дозволяє швидко накидати приблизні форми<br>вашого світу в головному вимірі, а потім додати деталі там, де потрібно, у поверхневому вимірі.</p><p>Головні виміри можуть використовувати всі можливості звичайних поверхневих вимірів (типи рельєфу, шари тощо),<br>тому великі ліси, системи печер тощо також легко створювати за їх допомогою.</p></html>
