startup.snapshot.message=<html><h1>Попередження\: випуск знімка</h1><p>Це знімок випуску WorldPainter. Це для тестування <em>тільки</em>!<p>Будь-які світи, які ви редагуєте за допомогою цієї версії <strong>може не завантажуватися</strong> до наступної виробничої версії<br>коли це випущено і <strong>не можна буде завантажити</strong> за поточною виробничою версією!<p><strong>Робіть резервні копії</strong> будь-яких існуючих світів, які ви хочете перевірити за допомогою цього випуску, у безпечному місці.<p>Будь-яка або вся робота, яку ви виконуєте з цим тестовим випуском, може бути втрачена, і якщо ви не створите резервні копії,<br>ви можете втратити ваші поточні світи.<p>Будь ласка, повідомляйте про помилки GitHub\: https\://github.com/Captain-Chaos/WorldPainter<p>Введіть «Я розумію» нижче, щоб продовжити тестування наступного випуску WorldPainter\:</p></html>
