ui.html.htmlMirroringWorksBy=<html>Дзеркалювання працює шляхом повороту блоків на 180 градусів.<br>\nЦе не працює для асиметричних блоків модів<br>\nповернуті версії не є дзеркалами оригіналів.</html>
ui.html.htmlNotesUlLi=<html>\nПримітки\:\n<ul>\n<li>Висота рельєфу та безперервні шари, такі як дерева, користувацькі шари об’єктів, іній тощо.<br>\nбуде плавно масштабовано за допомогою бікубічної інтерполяції. Хоча артефактів все ще не уникнути,<br>\nособливо у великих масштабах.\n<li>Окремі шари, такі як анотації та біоми, а також тип місцевості буде масштабовано<br>\nвикористовуючи інтерполяцію найближчого сусіда. У великих масштабах вони стануть помітно блоковими.\n<li>Масштабування місцевості з низькою роздільною здатністю (Імпортовано з Minecraftабо з низької висоти роздільної здатності<br>\nкарта) може призвести до блокування результатів.\n<li>По краях можна додати додаткову землю, щоб відповідати межам шматків.\n<li><strong>Увага\:</strong> якщо ви виконуєте масштабування, це може вийти з ладу, якщо не вистачить пам’яті. Збережіть свою роботу в<br>\nспочатку диск!\n</ul>\n</html>
ui.html.htmlOnThisPage=<html>На цій сторінці ви можете налаштувати порядок експорту ваших власних шарів, а також заборонити експорт певних шарів.<br>\nВищі шари списку експортуються <em>раніше</em> нижні шари. Шари не можна переміщувати між першим і другим проходом.<br>\n<strong>Примітка\:</strong> коли ви налаштуєте порядок на цьому екрані, нові шари будуть додані в кінець списку.</html>
ui.html.htmlOptimiseOnLoad=<html>Оптимізація під час завантаження,<br>накип на фарбі</html>
ui.html.htmlOptimisesTheImage=<html>Оптимізує зображення під час його першого завантаження,<br>але масштабує його під час малювання. Використовує менше пам'яті.</html>
ui.html.htmlPerformATest=<html>Виконайте тестовий експорт із зменшеною площею та/або функціями<br>для швидшого експорту\:</html>
ui.html.htmlReplacesAllAir=<html>Замінює все повітря, воду, лаву та інші несуттєві блоки на камінь.<br>\nЩоб також замінити штучні блоки, також використовуйте «видалити всі штучні споруди».</html>
ui.html.htmlScaleTheLevels=<html>Масштабувати рівні на вказаний відсоток;<br>\nрівні, які (все ще) занадто низькі або високі, будуть відсічені.</html>
ui.html.htmlScalesAndOptimises=<html>Масштабує та оптимізує зображення в пам'яті<br>під час першого завантаження. Використовує багато пам'яті.</html>
ui.html.htmlSelectAColour=<html>Виберіть колір і повністю заповніть полотно<br>\nВибраний колір стане кольором фону</html>
ui.html.htmlSelectAMethod=<html>Виберіть спосіб апаратного прискореного фарбування. Поекспериментуйте з цим<br>щоб покращити загальну продуктивність редактора або вирішити візуальні проблеми\:</html>
ui.html.htmlSelectAMethodAMethod=<html>Виберіть спосіб масштабування та зафарбовування зображення накладання. Експериментуйте<br>за допомогою цього, щоб покращити продуктивність накладеного зображення\:</html>
ui.html.htmlSetAllTo=<html>Установити для всіх <b>ні</b> розпад</html>
ui.html.htmlShiftTheLevels=<html>Зміщувати рівні вгору або вниз на вказану кількість блоків;<br>\nнегатив означає вниз; рівні, які (все ще) занадто низькі або високі, будуть відсічені.</html>
ui.html.htmlTheFollowingLayers=<html>Наступні шари будуть видалені. Зняти вибір<br>будь-які шари, які ви не хочете видаляти\:</html>
ui.html.htmlTheImportProcess=<html>Процес імпорту створив попередження. Карта може бути пошкоджена або пошкоджена.<br>\nМожливо, не всі частини було імпортовано правильно. Перегляньте наведені нижче попередження\:</html
ui.html.htmlTheRandomVariations=<html>Випадкові варіації вибраних об’єктів не однакові.<br>Поставте прапорець, якщо ви хочете встановити однакові значення для всіх них.</html>
ui.html.htmlTheRelativeFrequencies=<html>Відносні частоти вибраних об’єктів не однакові.<br>Поставте прапорець, якщо ви хочете встановити однакові значення для всіх них.</html>
ui.html.htmlTheseAreThe=<html>Це налаштування за замовчуванням. Їх можна встановити лише під час створення<br>шар. Після створення відредагуйте підлоговий вимір, щоб змінити висоту та форму.</html>
ui.html.htmlThisIsAn=<html>Це ан alpha версія функціональності плавучого виміру. Він не закінчений і<br>може не працювати належним чином. Функціональність може змінюватися. Будь ласка, опублікуйте відгук у subreddit.</html>
ui.html.htmlThisMapFormat=<html>Цей формат карти невідомий і не може бути експортований. Швидше за все<br>\nпідтримується плагіном, який не встановлено або не може бути завантажений.</html>
ui.html.htmlThisRemovesEm=<html>Це видаляє <em>все</em> дерев'яні та листяні блоки, в тому числі штучні!<br>\nWorldPainter не можу відрізнити натуральні дерев’яні блоки від штучних.<br>\nОбов’язково захистіть свої збірки за допомогою рівня лише для читання.</html>
ui.html.htmlThisWillCreate=<html>Це створить круговий світ. Вимір вказує на діаметр кола, а<br>\nпочаток (0,0) буде центром. Шар Void буде використовуватися для створення круглого краю світу.</html>
ui.html.htmlThisWillMark=<html>Це позначить всю місцевість як незаселену, викликаючи Minecraft створювати дерева,<br/>\nбасейни з водою та лавою, кишені бруду, гравію, вугілля, руди тощо (але не печери), як<br/>\nшматки завантажуються. Це сповільнить початкове завантаження кожного шматка, і ви це зробили<br/>\nвідсутність контролю за тим, де з’являються дерева, сніг тощо.</html>
ui.html.htmlToChangeThe=<html>Щоб змінити висоту та форму підлоги, закрийте це вікно,<br>клацніть правою кнопкою миші кнопку шару та виберіть «Редагувати плавучий вимір».</html>
