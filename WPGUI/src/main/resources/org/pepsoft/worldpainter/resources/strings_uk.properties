ui.dialog.scaleDimension.importedWarning=Цей світ було імпортовано з існуючої карти!\nЯкщо ви масштабуєте його, ви більше не зможете об’єднати його належним чином.\nВи впевнені, що бажаєте масштабувати вимір?
ui.dialog.shiftDimension.importedWarning=Цей світ було імпортовано з існуючої карти!\nЯкщо ви зсунете його, ви більше не зможете об’єднати його належним чином.\nВи впевнені, що бажаєте змінити вимір?
