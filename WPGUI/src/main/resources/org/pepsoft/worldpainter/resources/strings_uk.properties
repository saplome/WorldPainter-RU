the.import.functionality.only.imports.the.i.landscape=<html>Зверніть увагу\: функція імпорту імпортує лише <i>пейзаж</i><br>з існуючих карт!<br><br>Потім ви можете змінити ландшафт і об’єднати зміни з<br>наявну карту за допомогою функції «Об’єднати» (Ctrl+M).<br><br>Будь-які фрагменти з штучними конструкціями в них будуть позначені як прочитані-<br>лише за замовчуванням і залишиться незмінним після об’єднання карти.<br><br>Ви можете видалити прапорець лише для читання з цих фрагментів, але будьте<br>усвідомлюючи, що будь-які створені людиною конструкції в них можуть бути серйозними<br>спотворені або знищені!</html>
