ui.dialog.createMasterDimension.heading=<h1>Головні виміри</h1>
ui.dialog.createMasterDimension.intro=<p>Головний вимір експортується в 256 разів більшу площу та прискорює створення дуже великих карт.</p>
ui.dialog.createMasterDimension.bulletIrreversible=<li>Ви <b>не можеш змінити свою думку</b> пізніше; щоб скасувати цей вибір, потрібно почати спочатку.
