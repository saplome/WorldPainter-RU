may.we.have.your.permission=Чи можемо ми отримати ваш дозвіл на збір анонімної статистики використання?\nЦе суто призначено для того, щоб задовольнити цікавість автора про те, скільки\nлюди користуються програмою і звідки (приблизно) вони, і які\nфункції використовуються найчастіше. Інформація не включатиме жодної\nособисту інформацію, і вона ніколи не буде передана або продана нікому\nтреті особи.\n\nЯкщо ви відповісте «так», ви можете отримати спливаюче вікно із запитом брандмауера\nдля дозволу на надсилання інформації в Інтернет. Якщо так, то будь ласка\nпідтвердьте свій дозвіл на це спливаюче вікно.
