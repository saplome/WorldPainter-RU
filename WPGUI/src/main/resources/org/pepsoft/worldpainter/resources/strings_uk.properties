ui.about.languages.body=<h2>WorldPainter Languages</h2><p>Версія 2.27.0-L2.0.0 — неофіційний багатомовний форк WorldPainter 2.27.0 з інтерфейсом 10 мовами: англійською, російською, білоруською, українською, казахською, німецькою, французькою, іспанською, італійською та китайською.</p><p>Якщо проєкт корисний, поставте зірку на GitHub\:<br><a href="https\://github.com/saplome/WorldPainter-LANGUAGES">github.com/saplome/WorldPainter-LANGUAGES</a></p><p>WorldPainter Languages не пов’язаний з автором оригінального проєкту. Ви можете підтримати оригінальний WorldPainter на <a href="https\://www.worldpainter.net/">worldpainter.net</a>.</p>
