startup.snapshot.message=<html><h1>Warnung\: Snapshot-Version</h1><p>Dies ist eine Snapshot-Version von WorldPainter. Sie ist <em>nur</em> zum Testen gedacht\!<p>Welten, die du mit dieser Version bearbeitest, <strong>könnten möglicherweise nicht geladen werden</strong> von der nächsten Produktivversion,<br>wenn diese veröffentlicht wird, und <strong>könnten nicht geladen werden</strong> von der aktuellen Produktivversion\!<p><strong>Erstelle Sicherungskopien</strong> aller bestehenden Welten, die du mit dieser Version testen möchtest, an einem sicheren Ort.<p>Jegliche Arbeit mit dieser Testversion kann verloren gehen, und ohne Sicherungskopien<br>verlierst du möglicherweise deine aktuellen Welten.<p>Bitte melde Fehler auf GitHub\: https\://github.com/Captain-Chaos/WorldPainter<p>Gib unten \"I understand\" ein, um mit dem Testen der nächsten WorldPainter-Version fortzufahren\:</p></html>
