may.we.have.your.permission=Dürfen wir mit deiner Erlaubnis anonyme Nutzungsstatistiken erheben?\nSie dienen ausschließlich dazu, die Neugier des Autors zu befriedigen,\nwie viele Menschen das Programm nutzen, woher sie (ungefähr) kommen\nund welche Funktionen am häufigsten verwendet werden. Die Informationen\nenthalten keine personenbezogenen Daten und werden niemals an Dritte\nweitergegeben oder verkauft.\n\nWenn du mit "Ja" antwortest, fragt deine Firewall möglicherweise nach\nder Erlaubnis, Informationen ins Internet zu senden. Bestätige in diesem\nFall bitte deine Erlaubnis in diesem Dialog.
