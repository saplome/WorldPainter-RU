ui.html.htmlMirroringWorksBy=<html>Spiegelung funktioniert durch Drehen der Blöcke um 180 Grad.<br>\nSie funktioniert nicht für asymmetrische Mod-Blöcke, deren<br>\ngedrehte Versionen keine Spiegelbilder der Originale sind.</html>
ui.html.htmlNotesUlLi=<html>\nHinweise\:\n<ul>\n<li>Die Geländehöhe und kontinuierliche Ebenen wie Bäume, benutzerdefinierte Objektebenen, Frost usw.<br>\nwerden mit bikubischer Interpolation glatt skaliert. Artefakte sind dennoch unvermeidlich,<br>\nbesonders bei größeren Maßstäben.\n<li>Diskrete Ebenen wie Anmerkungen und Biome, aber auch der Geländetyp werden mit<br>\nNearest-Neighbour-Interpolation skaliert. Bei größeren Maßstäben werden diese sichtbar klotzig.\n<li>Das Skalieren von Gelände mit niedriger Auflösung (aus Minecraft importiert oder aus einer<br>\nniedrig aufgelösten Höhenkarte) kann klotzige Ergebnisse liefern.\n<li>An den Rändern kann zusätzliches Land hinzugefügt werden, um Chunk-Grenzen einzuhalten.\n<li><strong>Achtung\:</strong> beim Hochskalieren kann dies fehlschlagen, wenn nicht genug Speicher vorhanden ist. Speichere deine Arbeit zuerst<br>\nauf die Festplatte\!\n</ul>\n</html>
ui.html.htmlOnThisPage=<html>Auf dieser Seite kannst du die Exportreihenfolge deiner benutzerdefinierten Ebenen konfigurieren und verhindern, dass bestimmte Ebenen exportiert werden.<br>\nEbenen weiter oben in der Liste werden <em>vor</em> weiter unten stehenden Ebenen exportiert. Ebenen können nicht zwischen erstem und zweitem Durchgang verschoben werden.<br>\n<strong>Hinweis\:</strong> sobald du die Reihenfolge auf diesem Bildschirm anpasst, werden neue Ebenen am Ende der Liste hinzugefügt.</html>
ui.html.htmlOptimiseOnLoad=<html>Beim Laden optimieren,<br>beim Malen skalieren</html>
ui.html.htmlOptimisesTheImage=<html>Optimiert das Bild beim ersten Laden,<br>skaliert es aber beim Malen. Verbraucht weniger Speicher.</html>
ui.html.htmlPerformATest=<html>Führe einen Test-Export mit reduziertem Bereich und/oder reduzierten Features<br>für schnelleren Export durch\:</html>
ui.html.htmlReplacesAllAir=<html>Ersetzt alle Luft, Wasser, Lava und andere nicht feste Blöcke durch Stein.<br>\nUm auch menschengemachte Blöcke zu ersetzen, verwende zusätzlich "alle menschengemachten Strukturen entfernen".</html>
ui.html.htmlScaleTheLevels=<html>Skaliere die Höhen um den angegebenen Prozentsatz;<br>\nHöhen, die (weiterhin) zu niedrig oder zu hoch sind, werden abgeschnitten.</html>
ui.html.htmlScalesAndOptimises=<html>Skaliert und optimiert das Bild im Speicher,<br>wenn es zum ersten Mal geladen wird. Verbraucht viel Speicher.</html>
ui.html.htmlSelectAColour=<html>Wähle eine Farbe und fülle die Leinwand vollständig<br>\nDie gewählte Farbe wird zur Hintergrundfarbe</html>
ui.html.htmlSelectAMethod=<html>Wähle eine Methode für hardwarebeschleunigtes Malen. Experimentiere damit,<br>um die allgemeine Editor-Leistung zu verbessern oder Darstellungsprobleme zu lösen\:</html>
ui.html.htmlSelectAMethodAMethod=<html>Wähle eine Methode für Skalierung und Malen des Overlay-Bildes. Experimentiere<br>damit, um die Overlay-Leistung zu verbessern\:</html>
ui.html.htmlSetAllTo=<html>Alle auf <b>nicht</b> zerfallend setzen</html>
ui.html.htmlShiftTheLevels=<html>Verschiebe die Höhen um die angegebene Anzahl Blöcke nach oben oder unten;<br>\nnegativ bedeutet nach unten; Höhen, die (weiterhin) zu niedrig oder zu hoch sind, werden abgeschnitten.</html>
ui.html.htmlTheFollowingLayers=<html>Die folgenden Ebenen werden gelöscht. Wähle alle<br>Ebenen ab, die nicht gelöscht werden sollen\:</html>
ui.html.htmlTheImportProcess=<html>Der Importvorgang hat Warnungen erzeugt. Die Karte ist möglicherweise beschädigt oder fehlerhaft.<br>\nMöglicherweise wurden nicht alle Chunks korrekt importiert. Bitte prüfe die Warnungen unten\:</html
ui.html.htmlTheRandomVariations=<html>Die zufälligen Variationen der ausgewählten Objekte sind nicht alle gleich.<br>Aktiviere das Kontrollkästchen, wenn du sie alle auf denselben Wert setzen möchtest.</html>
ui.html.htmlTheRelativeFrequencies=<html>Die relativen Häufigkeiten der ausgewählten Objekte sind nicht alle gleich.<br>Aktiviere das Kontrollkästchen, wenn du sie alle auf denselben Wert setzen möchtest.</html>
ui.html.htmlTheseAreThe=<html>Dies sind die Standardeinstellungen. Sie können nur beim Erstellen der Ebene<br>festgelegt werden. Bearbeite danach die Bodendimension, um Höhe und Form zu ändern.</html>
ui.html.htmlThisIsAn=<html>Dies ist eine Alpha-Version der Funktion für schwebende Dimensionen. Sie ist nicht fertig und<br>funktioniert möglicherweise nicht korrekt. Die Funktionalität kann sich ändern. Bitte gib Feedback im Subreddit.</html>
ui.html.htmlThisMapFormat=<html>Dieses Kartenformat ist unbekannt und kann nicht exportiert werden. Höchstwahrscheinlich<br>\nwird es von einem Plugin unterstützt, das nicht installiert ist oder nicht geladen werden kann.</html>
ui.html.htmlThisRemovesEm=<html>Dies entfernt <em>alle</em> Holz- und Laubblöcke, auch menschengemachte\!<br>\nWorldPainter kann natürliche und menschengemachte Holzblöcke nicht unterscheiden.<br>\nSchütze deine Bauwerke unbedingt mit der Schreibgeschützt-Ebene.</html>
ui.html.htmlThisWillCreate=<html>Dies erstellt eine runde Welt. Die Größe gibt den Durchmesser des Kreises an, und<br>\nder Ursprung (0,0) ist der Mittelpunkt. Die Leere-Ebene wird verwendet, um den runden Rand der Welt zu erzeugen.</html>
ui.html.htmlThisWillMark=<html>Dies markiert das gesamte Gelände als unpopuliert, sodass Minecraft Bäume,<br/>\nWasser- und Lavaseen, Taschen aus Erde, Kies, Kohle, Erz usw. (aber keine Kavernen) generiert,<br/>\nwenn die Chunks geladen werden. Das verlangsamt das erste Laden jedes Chunks, und du hast<br/>\nkeine Kontrolle darüber, wo Bäume, Schnee usw. erscheinen.</html>
ui.html.htmlToChangeThe=<html>Um Höhe und Form des Bodens zu ändern, schließe dieses Fenster,<br>rechtsklicke auf die Ebenen-Schaltfläche und wähle "Schwebende Dimension bearbeiten".</html>
