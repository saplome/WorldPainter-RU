ui.dialog.createMasterDimension.heading=<h1>Master-Dimensionen</h1>
ui.dialog.createMasterDimension.intro=<p>Eine Master-Dimension wird mit 256-facher Fläche exportiert und beschleunigt die Erstellung sehr großer Karten.</p>
ui.dialog.createMasterDimension.bulletIrreversible=<li>Du kannst es dir später <b>nicht anders überlegen</b>; um diese Wahl rückgängig zu machen, musst du von vorne beginnen.
ui.dialog.createMasterDimension.bulletExportSlow=<li>Laden, Bearbeiten und Speichern sind schneller, aber der <b>Export dauert 256-mal länger</b> als bei einer regulären Dimension derselben Pixelgröße.
ui.dialog.createMasterDimension.bulletSurfaceDetail=<li>Detailliere Bereiche der Master-Dimension im Maßstab 1:1, indem du zur Oberflächendimension wechselst (
ui.dialog.createMasterDimension.bulletSurfaceDetailCont=+U oder das Menü Ansicht)<br>und dann Kacheln hinzufügst (
