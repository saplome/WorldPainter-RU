ui.dialog.masterDimensionInfo.title=Was ist eine Master-Dimension
ui.dialog.masterDimensionInfo.message=<html><h1>Master-Dimensionen</h1><p>Eine Master-Dimension ist ein WorldPainter-Dimensionstyp (ähnlich einer Deckendimension). Sie wird überall dort<br>im Maßstab 1:16 exportiert, wo die reguläre Oberflächendimension nicht existiert. Da die Master-Dimension<br>erst beim Export skaliert wird, sind Operationen wie Speichern, Laden und Bearbeiten <em>viel</em> schneller als<br>bei einer regulären Oberflächendimension dieser Größe. Beachte allerdings, dass der Export genauso lange dauert.</p><p>Verwende eine Master-Dimension, um schnell große strukturarme Bereiche deiner Welt zu erstellen (Ozeane, Kontinente,<br>Wüsten usw.). Wenn du der Oberflächendimension Kacheln hinzufügst, werden sie mit dem Inhalt der Master-Dimension<br>an dieser Stelle initialisiert. So kannst du die groben Formen deiner Welt schnell in der Master-Dimension<br>skizzieren und die Details dann bei Bedarf in der Oberflächendimension ausarbeiten.</p><p>Master-Dimensionen können alle Funktionen regulärer Oberflächendimensionen nutzen (Geländetypen, Ebenen usw.),<br>sodass sich auch große Wälder, Höhlensysteme usw. leicht damit erstellen lassen.</p></html>
