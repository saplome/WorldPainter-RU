ui.about.languages.body=<h2>WorldPainter Languages</h2><p>Version 2.27.0-L2.0.0 — ein inoffizieller mehrsprachiger Fork von WorldPainter 2.27.0 mit einer Benutzeroberfläche in 10 Sprachen: Englisch, Russisch, Belarussisch, Ukrainisch, Kasachisch, Deutsch, Französisch, Spanisch, Italienisch und Chinesisch.</p><p>Wenn das Projekt nützlich ist, gib ihm einen Stern auf GitHub\:<br><a href="https\://github.com/saplome/WorldPainter-LANGUAGES">github.com/saplome/WorldPainter-LANGUAGES</a></p><p>WorldPainter Languages ist nicht mit dem Autor des Originalprojekts verbunden. Du kannst das Original-WorldPainter unter <a href="https\://www.worldpainter.net/">worldpainter.net</a> unterstützen.</p>
