ui.dialog.scaleDimension.importedWarning=Questo mondo \u00e8 stato importato da una mappa esistente\!\nSe lo scali, non sarai pi\u00f9 in grado di fonderlo correttamente.\nSei sicuro di voler scalare la dimensione?
ui.dialog.shiftDimension.importedWarning=Questo mondo \u00e8 stato importato da una mappa esistente\!\nSe la sposti, non sarai pi\u00f9 in grado di fonderla correttamente.\nSei sicuro di voler spostare la dimensione?
