ui.dialog.createMasterDimension.heading=<h1>Dimensioni principali</h1>
ui.dialog.createMasterDimension.intro=<p>Una dimensione principale viene esportata a 256 volte l'area e accelera la creazione di mappe molto grandi.</p>
ui.dialog.createMasterDimension.bulletIrreversible=<li>Non potrai <b>cambiare idea</b> in seguito; per annullare questa scelta devi ricominciare da capo.
ui.dialog.createMasterDimension.bulletExportSlow=<li>Il caricamento, la modifica e il salvataggio sono pi\u00f9 rapidi, ma <b>l'esportazione richiede 256 volte pi\u00f9 tempo</b> rispetto a una dimensione normale delle stesse dimensioni in pixel.
ui.dialog.createMasterDimension.bulletSurfaceDetail=<li>Aggiungi dettagli alla dimensione principale in scala 1:1 passando alla dimensione di superficie (
ui.dialog.createMasterDimension.bulletSurfaceDetailCont=+U o il menu Visualizza)<br>e poi aggiungendo tessere (
ui.dialog.createMasterDimension.bulletSurfaceDetailEnd=+T o il menu Modifica).
