ui.dialog.masterDimensionInfo.title=Cos'\u00e8 una dimensione principale
ui.dialog.masterDimensionInfo.message=<html><h1>Dimensioni principali</h1><p>Una dimensione principale \u00e8 un tipo di dimensione di WorldPainter (simile a una dimensione del soffitto). Viene esportata<br>in scala 1:16 ovunque non esista la normale dimensione di superficie. Poich\u00e9 la dimensione principale viene<br>scalata solo in fase di esportazione, operazioni come il salvataggio, il caricamento e la modifica sono <em>molto</em> pi\u00f9 rapide<br>rispetto alla creazione di una normale dimensione di superficie di quella dimensione. Nota che comunque l'esportazione richiede lo stesso tempo.</p><p>Usa una dimensione principale per creare rapidamente grandi aree prive di dettagli del tuo mondo (oceani, continenti,<br>deserti, ecc.). Quando aggiungi tessere alla dimensione di superficie, verranno inizializzate con il contenuto<br>della dimensione principale in quella posizione. Questo ti permette di abbozzare rapidamente le forme approssimative<br>del tuo mondo nella dimensione principale, per poi riempire i dettagli dove necessario nella dimensione di superficie.</p><p>Le dimensioni principali possono usare tutte le funzionalit\u00e0 delle normali dimensioni di superficie (tipi di terreno, strati, ecc.)<br>quindi \u00e8 possibile creare facilmente anche grandi foreste, sistemi di grotte, ecc.</p></html>
