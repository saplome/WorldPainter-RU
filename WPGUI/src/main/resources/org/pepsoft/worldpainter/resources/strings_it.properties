startup.snapshot.message=<html><h1>Attenzione: versione snapshot</h1><p>Questa \u00e8 una versione snapshot di WorldPainter. \u00c8 <em>solo</em> per il testing!<p>I mondi che modifichi con questa versione <strong>potrebbero non essere caricabili</strong> dalla prossima versione di produzione<br>quando verr\u00e0 rilasciata, e <strong>non saranno caricabili</strong> dalla versione di produzione attuale!<p><strong>Crea backup</strong> di eventuali mondi esistenti che desideri testare con questa versione, in un luogo sicuro.<p>Tutto o parte del lavoro svolto con questa versione di test potrebbe andare perso e, se non crei backup,<br>potresti perdere i tuoi mondi attuali.<p>Segnala eventuali bug su GitHub: https://github.com/Captain-Chaos/WorldPainter<p>Digita "I understand" di seguito per procedere con il test della prossima versione di WorldPainter:</p></html>
