ui.about.languages.body=<h2>WorldPainter Languages</h2><p>Versione 2.27.0-L2.0.0 — un fork multilingue non ufficiale di WorldPainter 2.27.0 con l’interfaccia disponibile in 10 lingue: inglese, russo, bielorusso, ucraino, kazako, tedesco, francese, spagnolo, italiano e cinese.</p><p>Se trovi utile il progetto, metti una stella su GitHub\:<br><a href="https\://github.com/saplome/WorldPainter-LANGUAGES">github.com/saplome/WorldPainter-LANGUAGES</a></p><p>WorldPainter Languages non è affiliato all’autore del progetto originale. Puoi supportare il WorldPainter originale su <a href="https\://www.worldpainter.net/">worldpainter.net</a>.</p>
