ui.html.htmlMirroringWorksBy=<html>Lo specchiamento funziona ruotando i blocchi di 180 gradi.<br>\nNon funziona per i blocchi asimmetrici delle mod le cui<br>\nversioni ruotate non sono speculari agli originali.</html>
ui.html.htmlNotesUlLi=<html>\nNote\:\n<ul>\n<li>L'altezza del terreno e gli strati continui come alberi, strati di oggetti personalizzati, gelo, ecc.<br>\nverranno scalati in modo fluido usando l'interpolazione bicubica. Gli artefatti sono comunque inevitabili,<br>\nspecialmente a scale maggiori.\n<li>Gli strati discreti come Annotazioni e Biomi, ma anche il tipo di terreno, verranno scalati<br>\nusando l'interpolazione del vicino pi\u00f9 prossimo. A scale maggiori questi diventeranno visibilmente a blocchi.\n<li>Scalare un terreno a bassa risoluzione (importato da Minecraft, o da una mappa delle altezze<br>\na bassa risoluzione) potrebbe produrre risultati a blocchi.\n<li>Potrebbe essere aggiunto terreno extra ai bordi per soddisfare i confini dei chunk.\n<li><strong>Attenzione\:</strong> se stai scalando verso l'alto questo potrebbe fallire se non c'\u00e8 memoria sufficiente. Salva prima il tuo lavoro<br>\nsu disco\!\n</ul>\n</html>
ui.html.htmlOnThisPage=<html>In questa pagina puoi configurare l'ordine di esportazione dei tuoi strati personalizzati, oltre a impedire che alcuni strati vengano esportati.<br>\nGli strati pi\u00f9 in alto nell'elenco vengono esportati <em>prima</em> di quelli pi\u00f9 in basso. Gli strati non possono essere spostati tra il primo e il secondo passaggio.<br>\n<strong>Nota\:</strong> una volta personalizzato l'ordine in questa schermata, i nuovi strati verranno aggiunti alla fine dell'elenco.</html>
ui.html.htmlOptimiseOnLoad=<html>Ottimizza al caricamento,<br>scala durante la pittura</html>
ui.html.htmlOptimisesTheImage=<html>Ottimizza l'immagine al primo caricamento,<br>ma la scala durante la pittura. Usa meno memoria.</html>
ui.html.htmlPerformATest=<html>Esegui un'esportazione di prova con area e/o funzionalit\u00e0 ridotte<br>per un'esportazione pi\u00f9 rapida\:</html>
ui.html.htmlReplacesAllAir=<html>Sostituisce tutta l'aria, l'acqua, la lava e altri blocchi non solidi con pietra.<br>\nPer sostituire anche i blocchi artificiali, usa anche "rimuovi tutte le strutture artificiali".</html>
ui.html.htmlScaleTheLevels=<html>Scala i livelli della percentuale specificata;<br>\ni livelli che sono (ancora) troppo bassi o alti verranno troncati.</html>
ui.html.htmlScalesAndOptimises=<html>Scala e ottimizza l'immagine in memoria<br>al primo caricamento. Usa molta memoria.</html>
ui.html.htmlSelectAColour=<html>Seleziona un colore e riempi completamente la tela<br>\nIl colore selezionato diventer\u00e0 il colore di sfondo</html>
ui.html.htmlSelectAMethod=<html>Seleziona un metodo di pittura con accelerazione hardware. Sperimenta con questo<br>per migliorare le prestazioni generali dell'editor o risolvere problemi visivi\:</html>
ui.html.htmlSelectAMethodAMethod=<html>Seleziona un metodo di ridimensionamento e pittura dell'immagine di sovrapposizione. Sperimenta<br>con questo per migliorare le prestazioni dell'immagine di sovrapposizione\:</html>
ui.html.htmlSetAllTo=<html>Imposta tutti a <b>non</b> decadere</html>
ui.html.htmlShiftTheLevels=<html>Sposta i livelli in alto o in basso del numero di blocchi specificato;<br>\nun valore negativo indica verso il basso; i livelli che sono (ancora) troppo bassi o alti verranno troncati.</html>
ui.html.htmlTheFollowingLayers=<html>I seguenti strati verranno eliminati. Deseleziona<br>gli strati che non vuoi eliminare\:</html>
ui.html.htmlTheImportProcess=<html>Il processo di importazione ha generato avvisi. La mappa potrebbe essere danneggiata o corrotta.<br>\nNon tutti i chunk potrebbero essere stati importati correttamente. Rivedi gli avvisi qui sotto\:</html
ui.html.htmlTheRandomVariations=<html>Le variazioni casuali degli oggetti selezionati non sono tutte uguali.<br>Seleziona la casella se vuoi impostarle tutte allo stesso valore.</html>
ui.html.htmlTheRelativeFrequencies=<html>Le frequenze relative degli oggetti selezionati non sono tutte uguali.<br>Seleziona la casella se vuoi impostarle tutte allo stesso valore.</html>
ui.html.htmlTheseAreThe=<html>Queste sono le impostazioni predefinite. Possono essere impostate solo durante la creazione dello<br>strato. Una volta creato, modifica la dimensione del pavimento per cambiarne altezza e forma.</html>
ui.html.htmlThisIsAn=<html>Questa \u00e8 una versione alpha della funzionalit\u00e0 della dimensione fluttuante. Non \u00e8 completa e<br>potrebbe non funzionare correttamente. La funzionalit\u00e0 potrebbe cambiare. Pubblica i tuoi commenti sul subreddit.</html>
ui.html.htmlThisMapFormat=<html>Questo formato mappa \u00e8 sconosciuto e non pu\u00f2 essere esportato. \u00c8 molto probabile<br>\nche sia supportato da un plugin non installato o che non pu\u00f2 essere caricato.</html>
ui.html.htmlThisRemovesEm=<html>Questo rimuove <em>tutti</em> i blocchi di legno e foglie, incluse quelle artificiali\!<br>\nWorldPainter non riesce a distinguere tra blocchi di legno naturali e artificiali.<br>\nAssicurati di proteggere le tue costruzioni con lo strato di sola lettura.</html>
ui.html.htmlThisWillCreate=<html>Questo creer\u00e0 un mondo circolare. La dimensione indica il diametro del cerchio, e<br>\nl'origine (0,0) sar\u00e0 il centro. Lo strato Vuoto verr\u00e0 usato per creare il bordo circolare del mondo.</html>
ui.html.htmlThisWillMark=<html>Questo contrassegner\u00e0 l'intero terreno come non popolato, facendo generare a Minecraft alberi,<br/>\npozze d'acqua e lava, sacche di terra, ghiaia, carbone, minerali, ecc. (ma non caverne) mentre i<br/>\nchunk vengono caricati. Questo rallenter\u00e0 il caricamento iniziale di ogni chunk, e non avrai<br/>\nalcun controllo su dove appaiono alberi, neve, ecc.</html>
ui.html.htmlToChangeThe=<html>Per cambiare l'altezza e la forma del pavimento, chiudi questa finestra,<br>clicca con il tasto destro sul pulsante dello strato e seleziona "Modifica dimensione fluttuante".</html>
